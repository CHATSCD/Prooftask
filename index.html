<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProofTask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/styles.css?v=10" />
</head>
<body>

  <!-- ── LOGIN / REGISTER SCREEN ───────────────────────────── -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-box">PT</span>
        <h1>ProofTask</h1>
      </div>
      <div class="auth-tabs">
        <button id="tabSignIn" class="auth-tab active">Sign In</button>
        <button id="tabSignUp" class="auth-tab">Register</button>
      </div>
      <div id="loginError"   class="error-msg"   style="display:none;"></div>
      <div id="loginSuccess" class="success-msg" style="display:none;"></div>
      <div id="formSignIn">
        <input id="email"    type="email"    placeholder="Email address"    autocomplete="email" />
        <input id="password" type="password" placeholder="Password"         autocomplete="current-password" />
        <button id="loginBtn">Sign In</button>
      </div>
      <div id="formSignUp" style="display:none;">
        <input id="regName"     type="text"     placeholder="Full name" />
        <input id="regEmail"    type="email"    placeholder="Email address" autocomplete="email" />
        <input id="regPassword" type="password" placeholder="Password (min 6 chars)" />
        <button id="registerBtn">Create Account</button>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ───────────────────────────────────────────── -->
  <div id="app" style="display:none;">

    <nav class="navbar">
      <div class="nav-brand">
        <span class="logo-box small">PT</span>
        ProofTask
      </div>
      <div class="nav-right">
        <span id="userEmail" class="user-email"></span>
        <button id="logoutBtn" class="btn-logout">Sign Out</button>
      </div>
    </nav>

    <main class="main-content">

      <!-- ADMIN: CREATE TASK -->
      <div id="adminPanel" class="panel admin-panel" style="display:none;">
        <h2 class="panel-title">
          <span class="panel-badge">Admin</span>
          Create Task
        </h2>
        <div class="form-row">
          <input id="taskTitle" type="text" placeholder="Task title" />
        </div>
        <div class="form-row">
          <textarea id="taskNotes" placeholder="Task notes (optional)" rows="3"></textarea>
        </div>
        <div class="form-row">
          <select id="taskAssignee">
            <option value="">Assign to user (optional)</option>
          </select>
        </div>
        <button id="createTaskBtn" class="btn-create">+ Create Task</button>
      </div>

      <!-- ADMIN: USER MANAGEMENT -->
      <div id="userMgmtPanel" class="panel admin-panel" style="display:none;">
        <h2 class="panel-title">
          <span class="panel-badge">Admin</span>
          User Management
        </h2>
        <div class="add-user-form">
          <h3 class="add-user-title">Add New Worker</h3>
          <div class="add-user-fields">
            <input id="newUserName"     type="text"     placeholder="Full name" />
            <input id="newUserEmail"    type="email"    placeholder="Email address" />
            <input id="newUserPassword" type="password" placeholder="Temporary password" />
            <select id="newUserRole">
              <option value="user">Worker (User)</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button id="addUserBtn" class="btn-create">+ Add Worker</button>
          <div id="addUserMsg" class="add-user-msg" style="display:none;"></div>
        </div>
        <div class="divider"></div>
        <h3 class="add-user-title">Current Workers</h3>
        <div id="userList"><p class="empty-state">Loading users…</p></div>
      </div>

      <!-- TASK LIST -->
      <div class="panel">
        <h2 class="panel-title">Tasks</h2>
        <div id="taskList"><p class="empty-state">Loading tasks…</p></div>
      </div>

    </main>
  </div>

  <!-- ── PROOF PHOTO MODAL ─────────────────────────────────── -->
  <div id="proofModal" class="proof-overlay" style="display:none;">
    <div class="proof-card">

      <div class="proof-header">
        <h2 class="proof-title">Proof of Completion</h2>
        <p id="proofTaskName" class="proof-task-name"></p>
      </div>

      <!-- Live camera viewfinder -->
      <div class="viewfinder-wrap">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <div id="liveTimestamp" class="live-timestamp"></div>
        <div class="viewfinder-corners"></div>
      </div>

      <!-- Progress -->
      <div class="proof-progress">
        <span id="progressLabel" class="progress-label">Take photo 1 of 3</span>
        <div class="proof-dots">
          <div class="proof-dot" id="dot0"></div>
          <div class="proof-dot" id="dot1"></div>
          <div class="proof-dot" id="dot2"></div>
        </div>
      </div>

      <!-- Captured thumbnails -->
      <div id="proofThumbs" class="proof-thumbs"></div>

      <!-- Instruction -->
      <p id="proofInstruction" class="proof-instruction">
        Point camera at the area from a different angle for each photo.
      </p>

      <!-- Buttons -->
      <button id="captureBtn" class="btn-capture">&#9679; Capture</button>
      <button id="submitProofBtn" class="btn-submit-proof" style="display:none;">
        &#10003; Submit &amp; Complete Task
      </button>
      <button id="cancelProofBtn" class="btn-cancel-proof">Cancel</button>

      <div id="proofError" class="proof-error" style="display:none;"></div>
    </div>
  </div>

  <script type="module" src="./js/app.js?v=10"></script>
</body>
</html>
