<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProofTask App</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <!-- ============================
       LOGIN SCREEN
  ============================= -->
  <div id="loginScreen" class="flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded shadow w-80">
      <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

      <input 
        id="email" 
        type="email" 
        placeholder="Email"
        class="w-full mb-3 p-2 border rounded"
      />

      <input 
        id="password" 
        type="password" 
        placeholder="Password"
        class="w-full mb-4 p-2 border rounded"
      />

      <button 
        onclick="login()" 
        class="w-full bg-blue-600 text-white p-2 rounded"
      >
        Login
      </button>
    </div>
  </div>

  <!-- ============================
       MAIN APP
  ============================= -->
  <div id="app" style="display:none;" class="p-4">

    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">ProofTask</h1>
      <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">
        Logout
      </button>
    </div>

    <!-- ============================
         ADMIN PANEL
    ============================= -->
    <div id="adminPanel" style="display:none;" class="bg-white p-4 rounded shadow mb-4">
      <h2 class="text-lg font-bold mb-2">Admin Panel</h2>

      <input 
        id="taskTitle"
        placeholder="Task title"
        class="border p-2 w-full mb-2 rounded"
      />

      <textarea 
        id="taskNotes"
        placeholder="Task notes"
        class="border p-2 w-full mb-2 rounded"
      ></textarea>

      <button 
        onclick="createTask()" 
        class="bg-green-600 text-white px-3 py-2 rounded"
      >
        Create Task
      </button>
    </div>

    <!-- ============================
         TASK LIST
    ============================= -->
    <div id="taskList" class="space-y-3">
      <!-- Tasks will load here -->
    </div>

  </div>

  <!-- ============================
       APP SCRIPT
  ============================= -->
  <script type="module" src="./app.js"></script>

</body>
</html>
